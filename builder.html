<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Wobbly Builder v6</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d0f13;display:flex;height:100vh;font-family:Georgia,serif;color:#b8b4ac;overflow:hidden;}

/* ── Panel ── */
#panel{width:220px;min-width:220px;background:#141618;border-right:1px solid #1e2026;
  display:flex;flex-direction:column;padding:12px 10px;gap:8px;overflow-y:auto;}
h2{font-size:.95rem;letter-spacing:.12em;color:#d8d0c0;margin-bottom:2px;}
.sub{font-size:.54rem;color:#2a2a30;letter-spacing:.1em;}
.vl{font-size:.54rem;letter-spacing:.16em;text-transform:uppercase;color:#383838;
  margin-bottom:2px;margin-top:1px;}
hr{border:none;border-top:1px solid #1a1c22;}

/* generator sliders */
.gr{display:flex;align-items:center;gap:6px;font-size:.6rem;color:#585858;}
.gr label{min-width:74px;color:#686858;}
.gr input[type=range]{flex:1;accent-color:#6a8a50;}
.gv{min-width:16px;text-align:right;color:#7a9060;}
#gen-msg{font-size:.58rem;color:#586048;min-height:12px;letter-spacing:.04em;}

/* stone palette */
.stone-btn{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:4px;
  cursor:pointer;border:1px solid transparent;background:#181a20;transition:all .12s;}
.stone-btn:hover{border-color:#303038;background:#1e2028;}
.stone-btn.sel{border-color:#7a9aaa;background:#141e26;}
.stone-btn.sel-launch{border-color:#b89050;background:#1c1808;}
.swatch{width:20px;height:20px;border-radius:2px;flex-shrink:0;}
.sname{font-size:.64rem;color:#888;}
.sdim{font-size:.54rem;color:#383838;margin-top:1px;}

/* mode row */
.mrow{display:flex;gap:3px;}
.mbtn{flex:1;padding:4px 2px;border-radius:3px;font-size:.56rem;letter-spacing:.06em;
  text-transform:uppercase;cursor:pointer;font-family:Georgia,serif;
  border:1px solid #222228;color:#404040;background:transparent;transition:all .12s;}
.mbtn:hover{border-color:#484850;color:#808080;}
.mbtn.on{border-color:#7a9aaa;color:#9ab8c8;background:#101820;}

/* buttons */
.btn{width:100%;padding:6px 8px;border-radius:4px;font-size:.6rem;letter-spacing:.09em;
  text-transform:uppercase;cursor:pointer;font-family:Georgia,serif;
  border:1px solid #242428;color:#585858;background:transparent;transition:all .13s;text-align:center;}
.btn:hover{border-color:#585860;color:#a0a0a0;}
.btn.green{border-color:#365040;color:#60906a;}
.btn.green:hover{background:#0c1610;}
.btn.red{border-color:#502828;color:#906060;}
.btn.red:hover{background:#160c0c;}
.btn.gold{border-color:#504020;color:#907040;}
.btn.gold:hover{background:#141008;}

/* launch controls */
#launch-info{font-size:.58rem;color:#484838;line-height:1.7;}

/* status */
#stab-txt{font-size:.6rem;line-height:1.7;color:#484848;min-height:30px;}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#282830;
  margin-right:4px;vertical-align:middle;}
.dot.ok{background:#3a8050;}
.dot.bad{background:#803030;}
.dot.run{background:#606020;}

/* sel info */
#sel-info{font-size:.6rem;color:#404040;line-height:1.65;min-height:28px;}

/* json */
#json-out{width:100%;height:64px;background:#0a0c0e;border:1px solid #181a1e;border-radius:3px;
  color:#507060;font-size:.54rem;font-family:monospace;padding:4px;resize:none;line-height:1.4;}

/* ── Canvas area ── */
#carea{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;background:#09090d;}
canvas{border-radius:5px;cursor:crosshair;}

/* overlays */
#stab-ov{position:absolute;bottom:44px;left:50%;transform:translateX(-50%);
  padding:6px 14px;border-radius:5px;font-size:.66rem;letter-spacing:.07em;
  pointer-events:none;opacity:0;transition:opacity .2s;border:1px solid transparent;white-space:nowrap;}
#stab-ov.show{opacity:1;}
#stab-ov.ok{background:#081408;border-color:#284830;color:#60b870;}
#stab-ov.bad{background:#140808;border-color:#602828;color:#c06060;}
#stab-ov.chk{background:#141408;border-color:#484820;color:#909040;}

#hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  font-size:.54rem;letter-spacing:.08em;color:#1c1c20;text-transform:uppercase;white-space:nowrap;}
</style>
</head>
<body>

<div id="panel">
  <div><h2>Wobbly Builder</h2><div class="sub">v6</div></div>
  <hr/>

  <!-- Generator -->
  <div class="vl">Castle Generator</div>
  <div class="gr"><label>Tower height</label>
    <input type="range" id="g-th" min="2" max="7" value="4" oninput="$('gvth').textContent=this.value">
    <span class="gv" id="gvth">4</span></div>
  <div class="gr"><label>Tower width</label>
    <input type="range" id="g-tw" min="1" max="3" value="2" oninput="$('gvtw').textContent=this.value">
    <span class="gv" id="gvtw">2</span></div>
  <div class="gr"><label>Gate width</label>
    <input type="range" id="g-gw" min="1" max="3" value="2" oninput="$('gvgw').textContent=this.value">
    <span class="gv" id="gvgw">2</span></div>
  <div class="gr"><label>Crenels</label>
    <input type="range" id="g-cr" min="0" max="3" value="2" oninput="$('gvcr').textContent=this.value">
    <span class="gv" id="gvcr">2</span></div>
  <button class="btn gold" onclick="generate()">⟳ Generate</button>
  <div id="gen-msg"></div>

  <hr/>

  <!-- Stone palette — structure -->
  <div class="vl">Structure Stones</div>
  <div id="struct-pal"></div>

  <hr/>

  <!-- Stone palette — launched -->
  <div class="vl">Launched Stones</div>
  <div id="launch-pal"></div>

  <hr/>

  <!-- Edit mode -->
  <div class="vl">Edit Mode</div>
  <div class="mrow">
    <button class="mbtn on"  id="m-place"  onclick="setMode('place')">Place</button>
    <button class="mbtn"     id="m-select" onclick="setMode('select')">Select</button>
    <button class="mbtn"     id="m-delete" onclick="setMode('delete')">Delete</button>
  </div>
  <div id="sel-info">—</div>

  <hr/>

  <!-- Launcher -->
  <div class="vl">Launcher</div>
  <div id="launch-info">Drag <span style="color:#b89050">◈</span> on canvas<br>X offset: <span id="lx-lbl">—</span></div>

  <hr/>

  <!-- Physics -->
  <div class="vl">Physics</div>
  <div id="stab-txt"><span class="dot"></span>Not tested</div>
  <button class="btn green" onclick="testPhys()">▶ Test Physics</button>
  <button class="btn red"   onclick="stopPhys()">■ Stop / Reset</button>

  <hr/>

  <!-- Actions -->
  <div class="vl">Actions</div>
  <button class="btn" onclick="clearStruct()">Clear Structure</button>
  <button class="btn" onclick="clearAll()">Clear All</button>
  <button class="btn" onclick="importJSON()">Import JSON</button>
  <button class="btn green" onclick="copyJSON()">Copy JSON</button>
  <textarea id="json-out" readonly placeholder="Copy to view JSON…"></textarea>
</div>

<div id="carea">
  <canvas id="c"></canvas>
  <div id="stab-ov"></div>
  <div id="hint"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
'use strict';
const {Engine,Bodies,Body,World,Events}=Matter;

// ── Shorthand ─────────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);

// ── Canvas ────────────────────────────────────────────────────────────────────
const cv=$('c'), ctx=cv.getContext('2d');
function resize(){
  const a=$('carea');
  cv.width =Math.min(a.clientWidth -30, 900);
  cv.height=Math.min(a.clientHeight-30, 640);
}
resize();

// Ground geometry — all in canvas pixels
const GH=18;                    // ground body half-height
const GY=()=>cv.height-38;     // canvas Y of ground surface (top of ground)
const PGY=()=>GY()+GH;         // physics center of ground body
const CX=()=>cv.width/2;       // horizontal center

// ══════════════════════════════════════════════════════════════════════════════
// STONE DEFINITIONS
// ══════════════════════════════════════════════════════════════════════════════
//
// Structure stones — 4 types:
//   wall  : tall narrow rect — stacks into towers, topples sideways
//   slab  : wide thin rect  — bridges / caps, tips if load off-center
//   block : square rect     — crenellations, sits on surfaces
//   arch  : semicircle      — the non-quad! decorative + unstable crown piece
//
// Launched stones — 3 types (circle, decagon, astroid)

const STRUCT={
  wall: {label:'Wall',  col:'#6e6e80',w:26,h:52,shape:'rect', fr:.92,res:.02,den:.006},
  slab: {label:'Slab',  col:'#507060',w:82,h:14,shape:'rect', fr:.98,res:.01,den:.003},
  block:{label:'Block', col:'#4e4060',w:34,h:34,shape:'rect', fr:.95,res:.02,den:.005},
  arch: {label:'Arch',  col:'#7a6040',r:20,      shape:'arch', fr:.90,res:.03,den:.004},
};

const LAUNCH={
  circle: {label:'Circle', col:'#d8b050',shape:'circle',r:13,fr:.50,res:.15,den:.003},
  decagon:{label:'Decagon',col:'#c86838',shape:'poly',  r:14,sides:10,fr:.85,res:.08,den:.004},
  astroid:{label:'Astroid',col:'#9050b8',shape:'astroid',r:14,fr:.90,res:.06,den:.004},
};

// ── Vertex builders ───────────────────────────────────────────────────────────
function archVerts(cx,cy,r,n=28){
  // Solid half-disc (flat side down): semicircle on top, flat base
  const pts=[];
  for(let i=0;i<=n;i++){
    const t=Math.PI - i/n*Math.PI;   // π → 0 (top arc, left to right)
    pts.push({x:cx+r*Math.cos(t), y:cy+r*Math.sin(t)});
  }
  // flat base: right → left (already at y=cy since sin(0)=sin(π)=0)
  pts.push({x:cx-r, y:cy});
  return pts;
}
function polyVerts(cx,cy,r,sides){
  const pts=[];
  const ao=Math.PI/sides;
  for(let i=0;i<sides;i++){
    const t=i/sides*Math.PI*2+ao;
    pts.push({x:cx+r*Math.cos(t),y:cy+r*Math.sin(t)});
  }
  return pts;
}
function astroidVerts(cx,cy,r,n=44){
  const pts=[];
  for(let i=0;i<n;i++){
    const t=i/n*Math.PI*2;
    pts.push({x:cx+r*Math.pow(Math.cos(t),3),y:cy+r*Math.pow(Math.sin(t),3)});
  }
  return pts;
}

// ── Physics body factory ──────────────────────────────────────────────────────
const PHYS={slop:.04,frictionAir:.05};

function makeBody(s, isStatic=false){
  const def=STRUCT[s.type]||LAUNCH[s.type];
  if(!def) return null;
  const base={friction:def.fr,frictionStatic:Math.min(def.fr+.02,1),
    restitution:def.res,density:def.den,...PHYS,isStatic,angle:s.a||0};
  const{shape}=def;
  if(shape==='rect'){
    return Bodies.rectangle(s.x,s.y,def.w,def.h,{...base,chamfer:{radius:2}});
  }
  if(shape==='arch'){
    // Arch: flat side is the bottom. Place so flat bottom = s.y + r (bottom edge).
    // Physics center: the centroid of a half-disc is 4r/3π above the flat side.
    // We store s.y as the center of the bounding box (flat bottom + r above).
    return Bodies.fromVertices(s.x,s.y,archVerts(s.x,s.y,def.r),base,true);
  }
  if(shape==='circle'){
    return Bodies.circle(s.x,s.y,def.r,base);
  }
  if(shape==='poly'){
    return Bodies.fromVertices(s.x,s.y,polyVerts(s.x,s.y,def.r,def.sides),base,true);
  }
  if(shape==='astroid'){
    return Bodies.fromVertices(s.x,s.y,astroidVerts(s.x,s.y,def.r),base,true);
  }
  return null;
}

function groundBodies(){
  return[
    Bodies.rectangle(CX(),PGY(),cv.width*4,GH*2,{isStatic:true,friction:1,frictionStatic:1,restitution:0,label:'ground'}),
    Bodies.rectangle(-20,cv.height/2,40,cv.height*4,{isStatic:true,label:'wall'}),
    Bodies.rectangle(cv.width+20,cv.height/2,40,cv.height*4,{isStatic:true,label:'wall'}),
  ];
}

// ── Settle sim ────────────────────────────────────────────────────────────────
// Runs physics on `stones`, lets everything settle, then READS BACK the final
// resting positions and returns them as new stone descriptors.
// This means the returned coordinates ARE the physics-stable positions —
// placing bodies at those exact coordinates in a fresh sim produces zero drift.
function settleAndReadback(stones, steps=600){
  const e=Engine.create({gravity:{x:0,y:2},positionIterations:20,velocityIterations:16,enableSleeping:true});
  World.add(e.world,groundBodies());
  // Map from body → original stone so we can read back
  const pairs=[];
  stones.forEach(s=>{
    const b=makeBody(s,false);
    if(b){pairs.push({s,b});World.add(e.world,b);}
  });
  for(let i=0;i<steps;i++) Engine.update(e,16);

  const fallen=pairs.filter(({b})=>b.position.y>GY()+40).length;

  // Read back settled positions
  const settled=pairs.map(({s,b})=>({
    ...s,
    x:b.position.x,
    y:b.position.y,
    a:b.angle,
  }));

  // Check residual motion after settle
  const maxSpeed=pairs.reduce((m,{b})=>Math.max(m,
    Math.abs(b.velocity.x),Math.abs(b.velocity.y),Math.abs(b.angularVelocity)),0);

  World.clear(e.world,false);Engine.clear(e);
  return{settled,fallen,maxSpeed,ok:fallen===0&&maxSpeed<0.05};
}

// ── Verify sim ────────────────────────────────────────────────────────────────
// Places stones at their stored positions (already settled) and checks they
// don't move. Drift threshold is tight because coordinates are pre-settled.
function verifySim(stones, steps=200){
  const e=Engine.create({gravity:{x:0,y:2},positionIterations:20,velocityIterations:16,enableSleeping:true});
  World.add(e.world,groundBodies());
  const pairs=[];
  stones.forEach(s=>{
    const b=makeBody(s,false);
    if(b){b._ox=s.x;b._oy=s.y;pairs.push({s,b});World.add(e.world,b);}
  });
  for(let i=0;i<steps;i++) Engine.update(e,16);
  const fallen=pairs.filter(({b})=>b.position.y>GY()+40).length;
  const maxDrift=pairs.reduce((m,{b})=>Math.max(m,
    Math.hypot(b.position.x-b._ox,b.position.y-b._oy)),0);
  World.clear(e.world,false);Engine.clear(e);
  return{ok:fallen===0&&maxDrift<3,maxDrift,fallen};
}

// ══════════════════════════════════════════════════════════════════════════════
// CASTLE GENERATOR
// ══════════════════════════════════════════════════════════════════════════════
//
// A "Wobbly castle" has this exact silhouette:
//
//    [BK][  ][BK]        [BK][  ][BK]      ← crenels (block / gap alternating)
//    [========slab=====] [========slab=====] ← tower cap (ties columns together)
//    [W ][W ]                 [W ][W ]       ← upper wall rows (rows 1..TH-1)
//    [W ][W ] [===bridge===]  [W ][W ]       ← row-0 walls + gate bridge slab
//    ══════════════════════════════════════  ground
//
// ALL Y coordinates derived exactly: bottomEdge = topSurface of support.
// Slab caps and bridge always have guaranteed bearing on wall top surfaces.
// Arch stones crown the innermost crenel slots as decorative unstable pieces.

function generate(){
  const TH=+$('g-th').value;  // wall rows per tower
  const TW=+$('g-tw').value;  // wall columns per tower
  const GW=+$('g-gw').value;  // gate width (multiples of wall width)
  const CR=+$('g-cr').value;  // crenel pairs per tower cap

  const WW=STRUCT.wall.w, WH=STRUCT.wall.h;    // 26, 52
  const SW=STRUCT.slab.w, SH=STRUCT.slab.h;    // 82, 14
  const BKW=STRUCT.block.w,BKH=STRUCT.block.h; // 34, 34
  const AR=STRUCT.arch.r;                       // 20

  // Gate: clear span between innermost wall column faces
  // Each GW unit = 1 wall-width. We clamp so one or two slabs can bridge it.
  // One slab bridges up to SW - 2*minBearing wide.
  const MIN_BEARING=14; // px each end of slab must rest on wall
  const maxGate1=SW-2*MIN_BEARING;             // ~54px — bridgeable by 1 slab
  const maxGate2=SW*2-2*MIN_BEARING;           // ~136px — bridgeable by 2 slabs
  const rawGate=GW*WW+GW*4;
  const gatePx=Math.min(rawGate, maxGate2);
  const useTwoSlabs=gatePx>maxGate1;

  // Tower outer edge positions (measured from CX)
  // Left tower: columns at X = CX - gatePx/2 - WW/2, CX - gatePx/2 - WW*3/2, ...
  // col 0 = innermost (adjacent to gate)
  function leftColX(col){ return CX()-gatePx/2 - WW/2 - col*WW; }
  function rightColX(col){ return CX()+gatePx/2 + WW/2 + col*WW; }

  // Tower slab cap center X = midpoint of outermost and innermost column centers
  const towerCapLX = (leftColX(0)+leftColX(TW-1))/2;
  const towerCapRX = (rightColX(0)+rightColX(TW-1))/2;

  // Key Y surfaces (all as canvas Y, increasing downward)
  const groundY=GY();
  const towerTopY=groundY - TH*WH;       // top surface of tower walls
  const bridgeSupportY=groundY - WH;     // top surface of row-0 inner walls = bridge bearing

  const stones=[];

  function placeRect(type,cx,bottomY){
    const d=STRUCT[type];
    stones.push({type,x:cx,y:bottomY-d.h/2,a:0});
    return bottomY-d.h;   // new top surface
  }

  // ── Wall columns ────────────────────────────────────────────────────────────
  for(let col=0;col<TW;col++){
    for(const side of[-1,1]){
      const cx=side<0?leftColX(col):rightColX(col);
      let topY=groundY;
      for(let row=0;row<TH;row++) topY=placeRect('wall',cx,topY);
    }
  }

  // ── Bridge slab(s) ───────────────────────────────────────────────────────────
  // Rest on top of row-0 inner wall columns (bridgeSupportY)
  // Center of slab must be exactly CX()
  if(!useTwoSlabs){
    placeRect('slab',CX(),bridgeSupportY);
  } else {
    // Two slabs meeting in the middle; each centered between gate-center and inner wall
    const lCX=CX()-gatePx/4-WW/4;
    const rCX=CX()+gatePx/4+WW/4;
    placeRect('slab',lCX,bridgeSupportY);
    placeRect('slab',rCX,bridgeSupportY);
  }

  // ── Tower cap slabs ──────────────────────────────────────────────────────────
  // Lie across all TW columns, tying them together
  // Bottom edge = towerTopY. Each cap slab is SW=82px wide.
  // If TW*WW > SW, use two slabs side by side.
  const towerFootprint=TW*WW;
  if(towerFootprint<=SW){
    placeRect('slab',towerCapLX,towerTopY);
    placeRect('slab',towerCapRX,towerTopY);
  } else {
    // Two slabs side by side over the tower
    placeRect('slab',towerCapLX-SW/2,towerTopY);
    placeRect('slab',towerCapLX+SW/2,towerTopY);
    placeRect('slab',towerCapRX-SW/2,towerTopY);
    placeRect('slab',towerCapRX+SW/2,towerTopY);
  }
  const capTopY=towerTopY-SH;  // top surface of the cap slabs

  // ── Crenellations ───────────────────────────────────────────────────────────
  // Blocks sit on cap, alternating with gaps.
  // We space them evenly across SW, at most 3 per cap.
  // Innermost position gets an ARCH instead of a block — the unstable non-quad.
  if(CR>0){
    const count=Math.min(CR,3);
    function placeCrenels(capCX){
      // positions across the slab cap width
      const step=SW/(count*2);   // block every 2 step-widths (block+gap)
      for(let i=0;i<count;i++){
        const offset=-SW/2+step*(i*2+1);
        const cx=capCX+offset;
        const isInner=i===0;
        if(isInner){
          // Arch: flat bottom down. Bottom edge = capTopY.
          // Arch centroid (fromVertices adjusts) — approximate center as capTopY - r
          stones.push({type:'arch',x:cx,y:capTopY-AR,a:0});
        } else {
          placeRect('block',cx,capTopY);
        }
      }
    }
    placeCrenels(towerCapLX);
    placeCrenels(towerCapRX);
  }

  // ── Settle: run physics, read back resting positions ────────────────────────
  // After this, `final` coordinates ARE the physics-stable positions.
  // Placing bodies at these exact coords in a fresh sim → zero drift.
  $('gen-msg').textContent='Settling…';
  const settle=settleAndReadback(stones, 700);

  if(settle.fallen>0){
    $('gen-msg').textContent=`⚠ ${settle.fallen} stone(s) fell — try smaller settings`;
    return;
  }

  // Verify: drop bodies at their settled positions, confirm nothing moves
  const verify=verifySim(settle.settled, 200);

  $('gen-msg').textContent=verify.ok
    ? `✓ Balanced (${stones.length} stones, drift ${verify.maxDrift.toFixed(2)}px)`
    : `⚠ residual drift ${verify.maxDrift.toFixed(1)}px — use Test Physics to inspect`;

  // Load settled positions into editor
  structStones=settle.settled.map(s=>({...s,id:nextId++}));
  launchStones=[];

  launcherX=Math.min(...structStones.map(s=>{
    const d=STRUCT[s.type];return s.x-(d.w||d.r||20)/2;
  }))-100;
  launcherX=Math.max(30,launcherX);
  stopPhys();
  scheduleStab();
  updateLXLabel();
}

// ══════════════════════════════════════════════════════════════════════════════
// EDITOR STATE
// ══════════════════════════════════════════════════════════════════════════════
let structStones=[];   // [{type,x,y,a,id}, ...]
let launchStones=[];   // [{type,x,y,a,id}, ...]
let nextId=1;
let launcherX=120;

// Active selections
let activeStruct='wall';
let activeLaunch='circle';
let mode='place';       // 'place' | 'select' | 'delete'
let placeLayer='struct'; // 'struct' | 'launch'

let selId=null,selLayer=null;
let dragId=null,dragLayer=null,dragOX=0,dragOY=0;
let draggingLauncher=false;
let ghost=null;  // {x,y} mouse position on canvas
let placeAngle=0;
let mDown=false, mStart={x:0,y:0}, mDragged=false;

// Physics live test
let physOn=false,physEng=null,physBods=[];
let physTick=0;

// Stability check (background)
let stabTimer=null;

// ── Stone geometry helpers ────────────────────────────────────────────────────
function halfW(type){ const d=STRUCT[type]||LAUNCH[type]; return d.shape==='rect'?d.w/2:d.r; }
function halfH(type){ const d=STRUCT[type]||LAUNCH[type];
  if(d.shape==='rect')return d.h/2;
  if(d.shape==='arch')return d.r/2;  // bounding approx
  return d.r; }

function stoneHit(s,mx,my){
  const d=STRUCT[s.type]||LAUNCH[s.type];
  if(!d)return false;
  const hw=halfW(s.type)+5,hh=halfH(s.type)+5;
  return Math.abs(mx-s.x)<=hw&&Math.abs(my-s.y)<=hh;
}

function findStone(mx,my,layer){
  const arr=layer==='struct'?structStones:launchStones;
  for(let i=arr.length-1;i>=0;i--) if(stoneHit(arr[i],mx,my))return arr[i];
  return null;
}
function findAny(mx,my){
  return findStone(mx,my,'struct')||findStone(mx,my,'launch');
}
function layerOf(id){
  if(structStones.find(s=>s.id===id))return'struct';
  if(launchStones.find(s=>s.id===id))return'launch';
  return null;
}

// ── Palette builders ──────────────────────────────────────────────────────────
function buildPalettes(){
  // Structure
  const sp=$('struct-pal');sp.innerHTML='';
  Object.entries(STRUCT).forEach(([k,d])=>{
    const btn=document.createElement('div');
    btn.className='stone-btn'+(k===activeStruct&&placeLayer==='struct'?' sel':'');
    btn.onclick=()=>{activeStruct=k;placeLayer='struct';buildPalettes();updateHint();};
    const sw=document.createElement('div');sw.className='swatch';
    sw.style.background=d.col;
    sw.style.borderRadius=d.shape==='arch'?'50% 50% 0 0':d.shape==='rect'?'2px':'50%';
    const info=document.createElement('div');
    const dims=d.shape==='rect'?`${d.w}×${d.h}`:d.shape==='arch'?`r${d.r} arch`:`r${d.r}`;
    info.innerHTML=`<div class="sname">${d.label}</div><div class="sdim">${dims}</div>`;
    btn.append(sw,info);sp.append(btn);
  });

  // Launch
  const lp=$('launch-pal');lp.innerHTML='';
  Object.entries(LAUNCH).forEach(([k,d])=>{
    const btn=document.createElement('div');
    btn.className='stone-btn'+(k===activeLaunch&&placeLayer==='launch'?' sel-launch':'');
    btn.onclick=()=>{activeLaunch=k;placeLayer='launch';buildPalettes();updateHint();};
    const sw=document.createElement('div');sw.className='swatch';
    sw.style.background=d.col;sw.style.borderRadius='50%';
    const info=document.createElement('div');
    info.innerHTML=`<div class="sname">${d.label}</div><div class="sdim">r${d.r}</div>`;
    btn.append(sw,info);lp.append(btn);
  });
}
buildPalettes();

// ── Mode ──────────────────────────────────────────────────────────────────────
function setMode(m){
  mode=m;selId=null;selLayer=null;dragId=null;
  ['place','select','delete'].forEach(n=>{
    $(m=n?'m-'+n:'').className='mbtn'+(m===n?' on':'');
    $('m-'+n).className='mbtn'+(m===n?' on':'');
  });
  updateHint();updateSelInfo();
}

function updateHint(){
  const layer=placeLayer==='struct'?'structure':'launch';
  const ang=((placeAngle||0)*180/Math.PI).toFixed(0);
  const h={
    place:`Place ${layer} stone · Q/E rotate(${ang}°) · R reset · right-click delete`,
    select:'Select — drag to move · arrows nudge · Q/E rotate · Del remove',
    delete:'Delete — click any stone',
  };
  $('hint').textContent=h[mode];
}

function updateSelInfo(){
  if(!selId){$('sel-info').textContent='Click a stone in Select mode.';return;}
  const arr=selLayer==='struct'?structStones:launchStones;
  const s=arr.find(x=>x.id===selId);if(!s){$('sel-info').textContent='—';return;}
  const d=STRUCT[s.type]||LAUNCH[s.type];
  $('sel-info').innerHTML=`<strong style="color:#909090">${d.label}</strong> [${selLayer}]<br>x:${Math.round(s.x-CX())} y:${Math.round(s.y)} ∠${((s.a||0)*180/Math.PI).toFixed(1)}°`;
}

function updateLXLabel(){ $('lx-lbl').textContent=Math.round(launcherX-CX()); }

// ── Add / Remove ──────────────────────────────────────────────────────────────
function addStone(mx,my){
  if(physOn) return;
  const type=placeLayer==='struct'?activeStruct:activeLaunch;
  const def=STRUCT[type]||LAUNCH[type];
  const hh=def.shape==='rect'?def.h/2:def.r;
  const y=Math.min(my,GY()-hh);
  const s={type,x:Math.round(mx),y:Math.round(y),a:placeAngle,id:nextId++};
  if(placeLayer==='struct') structStones.push(s);
  else launchStones.push(s);
  scheduleStab();
}

function removeStone(id){
  const l=layerOf(id);if(!l)return;
  if(l==='struct') structStones=structStones.filter(s=>s.id!==id);
  else launchStones=launchStones.filter(s=>s.id!==id);
  if(selId===id){selId=null;selLayer=null;}
  updateSelInfo();scheduleStab();
}

// ── Physics live test ─────────────────────────────────────────────────────────
function testPhys(){
  stopPhys();physOn=true;
  physEng=Engine.create({gravity:{x:0,y:2},positionIterations:20,velocityIterations:16,enableSleeping:true});
  World.add(physEng.world,groundBodies());
  physBods=[];
  [...structStones,...launchStones].forEach(s=>{
    const b=makeBody(s,false);
    if(b){b._sid=s.id;physBods.push(b);World.add(physEng.world,b);}
  });
  $('stab-txt').innerHTML='<span class="dot run"></span>Simulating…';
}

function stopPhys(){
  physOn=false;
  if(physEng){World.clear(physEng.world,false);Engine.clear(physEng);}
  physEng=null;physBods=[];physTick=0;
  $('stab-txt').innerHTML='<span class="dot"></span>Not tested';
}

function tickPhys(){
  if(!physOn||!physEng)return;
  Engine.update(physEng,1000/60);
  if(physTick++%45===0){
    const fell=physBods.filter(b=>b.position.y>GY()+50).length;
    const mv=physBods.filter(b=>Math.abs(b.velocity.x)>.1||Math.abs(b.velocity.y)>.1||Math.abs(b.angularVelocity)>.01).length;
    if(fell) $('stab-txt').innerHTML=`<span class="dot bad"></span>${fell} stone(s) fell`;
    else if(!mv) $('stab-txt').innerHTML='<span class="dot ok"></span>Stable ✓';
    else $('stab-txt').innerHTML=`<span class="dot run"></span>${mv} still moving…`;
  }
}

// ── Background stability check (static) ───────────────────────────────────────
function scheduleStab(){
  clearTimeout(stabTimer);
  setStabOv('chk','Checking…');
  stabTimer=setTimeout(()=>{
    if(!structStones.length&&!launchStones.length){hideStabOv();return;}
    const r=verifySim([...structStones,...launchStones],200);
    if(r.ok) setStabOv('ok','✓ Structure stable');
    else setStabOv('bad',`⚠ drift ${r.maxDrift.toFixed(0)}px`);
  },400);
}

function setStabOv(cls,txt){
  const el=$('stab-ov');
  el.textContent=txt;el.className='show '+cls;
}
function hideStabOv(){ $('stab-ov').className=''; }

// ── Actions ────────────────────────────────────────────────────────────────────
function clearStruct(){
  if(!confirm('Clear structure stones?'))return;
  structStones=[];selId=null;selLayer=null;stopPhys();scheduleStab();updateSelInfo();
}
function clearAll(){
  if(!confirm('Clear everything?'))return;
  structStones=[];launchStones=[];selId=null;selLayer=null;stopPhys();hideStabOv();updateSelInfo();
}
function importJSON(){
  const raw=prompt('Paste JSON:');if(!raw)return;
  try{
    const d=JSON.parse(raw),BX=CX();
    structStones=(d.structure||[]).map(s=>({type:s.t,x:s.x+BX,y:s.y,a:s.a||0,id:nextId++}));
    launchStones=(d.launch||[]).map(s=>({type:s.t,x:s.x+BX,y:s.y,a:s.a||0,id:nextId++}));
    if(d.launcherX!=null)launcherX=d.launcherX+BX;
    stopPhys();scheduleStab();updateLXLabel();
  }catch(e){alert('Invalid JSON');}
}
function copyJSON(){
  const BX=CX();
  const out={
    launcherX:Math.round(launcherX-BX),
    structure:structStones.map(s=>({t:s.type,x:Math.round(s.x-BX),y:Math.round(s.y),...(Math.abs(s.a||0)>.001?{a:+s.a.toFixed(3)}:{})})),
    launch:launchStones.map(s=>({t:s.type,x:Math.round(s.x-BX),y:Math.round(s.y),...(Math.abs(s.a||0)>.001?{a:+s.a.toFixed(3)}:{})})),
  };
  const j=JSON.stringify(out,null,2);
  $('json-out').value=j;
  navigator.clipboard.writeText(j).then(()=>{
    const btn=event.target,orig=btn.textContent;
    btn.textContent='Copied!';setTimeout(()=>btn.textContent=orig,1400);
  });
}

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(mode==='place'){
    if(e.key==='q'||e.key==='Q'){placeAngle-=.08;updateHint();e.preventDefault();return;}
    if(e.key==='e'||e.key==='E'){placeAngle+=.08;updateHint();e.preventDefault();return;}
    if(e.key==='r'||e.key==='R'){placeAngle=0;updateHint();e.preventDefault();return;}
  }
  if(!selId)return;
  const arr=selLayer==='struct'?structStones:launchStones;
  const s=arr.find(x=>x.id===selId);if(!s)return;
  const step=e.shiftKey?1:4;
  if(e.key==='ArrowLeft'){s.x-=step;e.preventDefault();}
  if(e.key==='ArrowRight'){s.x+=step;e.preventDefault();}
  if(e.key==='ArrowUp'){s.y-=step;e.preventDefault();}
  if(e.key==='ArrowDown'){s.y+=step;e.preventDefault();}
  if(e.key==='q'||e.key==='Q'){s.a=(s.a||0)-.04;}
  if(e.key==='e'||e.key==='E'){s.a=(s.a||0)+.04;}
  if(e.key==='Delete'||e.key==='Backspace'){removeStone(selId);e.preventDefault();return;}
  updateSelInfo();scheduleStab();
});

// ── Mouse ──────────────────────────────────────────────────────────────────────
function mp(e){const r=cv.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}
const nearLauncher=p=>Math.hypot(p.x-launcherX,p.y-GY())<=16;

cv.addEventListener('contextmenu',e=>{
  e.preventDefault();const p=mp(e);
  const s=findAny(p.x,p.y);if(s)removeStone(s.id);
});

cv.addEventListener('mousedown',e=>{
  if(e.button!==0)return;
  const p=mp(e);mStart={...p};mDown=true;mDragged=false;
  if(nearLauncher(p)){draggingLauncher=true;return;}
  if(mode==='select'){
    // Try active layer first, then other
    let s=findStone(p.x,p.y,'struct')||findStone(p.x,p.y,'launch');
    if(s){
      selId=s.id;selLayer=layerOf(s.id);
      dragId=s.id;dragLayer=selLayer;dragOX=p.x-s.x;dragOY=p.y-s.y;
    } else {selId=null;selLayer=null;dragId=null;}
    updateSelInfo();
  }
  if(mode==='delete'){const s=findAny(p.x,p.y);if(s)removeStone(s.id);}
});

cv.addEventListener('mousemove',e=>{
  const p=mp(e);ghost={...p};
  if(!mDown)return;
  if(Math.hypot(p.x-mStart.x,p.y-mStart.y)>5)mDragged=true;
  if(draggingLauncher){
    launcherX=Math.max(16,Math.min(cv.width-16,p.x));
    updateLXLabel();return;
  }
  if(mode==='select'&&dragId){
    const arr=dragLayer==='struct'?structStones:launchStones;
    const s=arr.find(x=>x.id===dragId);
    if(s){s.x=Math.round(p.x-dragOX);s.y=Math.round(p.y-dragOY);updateSelInfo();}
  }
});

cv.addEventListener('mouseup',e=>{
  if(draggingLauncher){draggingLauncher=false;mDown=false;scheduleStab();return;}
  const p=mp(e);
  if(mode==='place'&&mDown&&!mDragged&&!physOn) addStone(p.x,p.y);
  if(mode==='select'&&dragId) scheduleStab();
  mDown=false;dragId=null;dragLayer=null;draggingLauncher=false;
});
cv.addEventListener('mouseleave',()=>{ghost=null;mDown=false;dragId=null;draggingLauncher=false;});

// ══════════════════════════════════════════════════════════════════════════════
// RENDERING
// ══════════════════════════════════════════════════════════════════════════════
function shade(hex,amt){
  const n=parseInt(hex.slice(1),16);
  const cl=v=>Math.min(255,Math.max(0,v));
  return`rgb(${cl((n>>16)+amt)},${cl(((n>>8)&255)+amt)},${cl((n&255)+amt)})`;
}

function drawRect(d,x,y,a,hi){
  ctx.save();ctx.translate(x,y);ctx.rotate(a);
  ctx.shadowColor=hi?'rgba(120,190,255,.6)':'rgba(0,0,0,.5)';
  ctx.shadowBlur=hi?16:8;ctx.shadowOffsetY=hi?0:3;
  const hw=d.w/2,hh=d.h/2,r=2;
  ctx.beginPath();
  ctx.moveTo(-hw+r,-hh);ctx.lineTo(hw-r,-hh);ctx.arcTo(hw,-hh,hw,-hh+r,r);
  ctx.lineTo(hw,hh-r);ctx.arcTo(hw,hh,hw-r,hh,r);
  ctx.lineTo(-hw+r,hh);ctx.arcTo(-hw,hh,-hw,hh-r,r);
  ctx.lineTo(-hw,-hh+r);ctx.arcTo(-hw,-hh,-hw+r,-hh,r);
  ctx.closePath();
  const g=ctx.createLinearGradient(0,-hh,0,hh);
  g.addColorStop(0,shade(d.col,30));g.addColorStop(1,shade(d.col,-20));
  ctx.fillStyle=g;ctx.fill();
  ctx.shadowColor='transparent';
  ctx.strokeStyle=hi?'rgba(140,200,255,.8)':shade(d.col,-50);
  ctx.lineWidth=hi?1.6:.7;ctx.stroke();
  // subtle horizontal lines (masonry texture)
  if(!hi&&d.h>20){
    ctx.strokeStyle='rgba(0,0,0,.1)';ctx.lineWidth=.5;
    const rows=Math.floor(d.h/14);
    for(let i=1;i<rows;i++){const ly=-hh+i*(d.h/rows);ctx.beginPath();ctx.moveTo(-hw+2,ly);ctx.lineTo(hw-2,ly);ctx.stroke();}
  }
  ctx.restore();
}

function drawArch(d,x,y,a,hi){
  ctx.save();ctx.translate(x,y);ctx.rotate(a);
  ctx.shadowColor=hi?'rgba(255,200,100,.6)':'rgba(0,0,0,.5)';
  ctx.shadowBlur=hi?16:8;ctx.shadowOffsetY=hi?0:3;
  const r=d.r;
  // Draw centred on (0,0) — after settle, x,y IS the physics centroid
  // The centroid of a half-disc is 4r/(3π) ≈ 0.424r above the flat base
  // So flat base is at y_centroid + 0.424r, arc peak at y_centroid - r + 0.424r
  const cOff=4*r/(3*Math.PI); // centroid offset above flat base
  ctx.beginPath();
  ctx.arc(0,-cOff,r,Math.PI,0);
  ctx.lineTo(r,-cOff);ctx.lineTo(-r,-cOff);ctx.closePath();
  const g=ctx.createRadialGradient(-r*.2,-cOff-r*.3,2,0,-cOff,r*1.2);
  g.addColorStop(0,shade(d.col,40));g.addColorStop(1,shade(d.col,-15));
  ctx.fillStyle=g;ctx.fill();
  ctx.shadowColor='transparent';
  ctx.strokeStyle=hi?'rgba(255,200,100,.9)':shade(d.col,-50);
  ctx.lineWidth=hi?1.8:.8;ctx.stroke();
  ctx.restore();
}

function drawCircle(d,x,y,a,hi,num){
  ctx.save();ctx.translate(x,y);ctx.rotate(a);
  ctx.shadowColor=hi?'rgba(255,210,80,.8)':'rgba(0,0,0,.5)';
  ctx.shadowBlur=hi?18:8;ctx.shadowOffsetY=hi?0:3;
  const g=ctx.createRadialGradient(-d.r*.2,-d.r*.25,1,0,0,d.r*1.2);
  g.addColorStop(0,shade(d.col,50));g.addColorStop(1,shade(d.col,-20));
  ctx.beginPath();
  if(d.shape==='circle')ctx.arc(0,0,d.r,0,Math.PI*2);
  else if(d.shape==='poly'){const v=polyVerts(0,0,d.r,d.sides);ctx.moveTo(v[0].x,v[0].y);v.forEach(p=>ctx.lineTo(p.x,p.y));ctx.closePath();}
  else{const v=astroidVerts(0,0,d.r,44);ctx.moveTo(v[0].x,v[0].y);v.forEach(p=>ctx.lineTo(p.x,p.y));ctx.closePath();}
  ctx.fillStyle=g;ctx.fill();
  ctx.shadowColor='transparent';
  ctx.strokeStyle=hi?'rgba(255,210,80,.9)':shade(d.col,-55);ctx.lineWidth=hi?2:1;ctx.stroke();
  if(num!=null){
    ctx.rotate(-a);ctx.fillStyle='rgba(255,255,255,.92)';ctx.font='bold 9px Georgia';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(num,0,0);
  }
  ctx.restore();
}

function getPhysState(id){
  if(!physOn)return null;
  const b=physBods.find(b=>b._sid===id);
  return b?{x:b.position.x,y:b.position.y,a:b.angle}:null;
}

function drawStone(s,hi=false,num=null){
  const ps=getPhysState(s.id);
  const x=ps?ps.x:s.x, y=ps?ps.y:s.y, a=ps?ps.a:(s.a||0);
  const d=STRUCT[s.type]||LAUNCH[s.type];
  if(d.shape==='rect')  drawRect(d,x,y,a,hi);
  else if(d.shape==='arch') drawArch(d,x,y,a,hi);
  else drawCircle(d,x,y,a,hi,num);
}

function drawGhost(){
  if(!ghost||physOn||mode!=='place')return;
  const type=placeLayer==='struct'?activeStruct:activeLaunch;
  const d=STRUCT[type]||LAUNCH[type];if(!d)return;
  const hh=d.shape==='rect'?d.h/2:d.r;
  const y=Math.min(ghost.y,GY()-hh);
  ctx.save();ctx.globalAlpha=.25;ctx.translate(ghost.x,y);ctx.rotate(placeAngle);
  ctx.fillStyle=d.col;
  if(d.shape==='rect'){ctx.fillRect(-d.w/2,-d.h/2,d.w,d.h);}
  else if(d.shape==='arch'){
    const cOff=4*d.r/(3*Math.PI);
    ctx.beginPath();ctx.arc(0,-cOff,d.r,Math.PI,0);ctx.lineTo(d.r,-cOff);ctx.lineTo(-d.r,-cOff);ctx.closePath();ctx.fill();
  }
  else if(d.shape==='circle'){ctx.beginPath();ctx.arc(0,0,d.r,0,Math.PI*2);ctx.fill();}
  else if(d.shape==='poly'){ctx.beginPath();const v=polyVerts(0,0,d.r,d.sides);ctx.moveTo(v[0].x,v[0].y);v.forEach(p=>ctx.lineTo(p.x,p.y));ctx.closePath();ctx.fill();}
  else{ctx.beginPath();const v=astroidVerts(0,0,d.r,44);ctx.moveTo(v[0].x,v[0].y);v.forEach(p=>ctx.lineTo(p.x,p.y));ctx.closePath();ctx.fill();}
  ctx.restore();
}

function drawLauncher(){
  const lx=launcherX,ly=GY();
  const near=ghost&&nearLauncher(ghost);
  ctx.save();
  ctx.beginPath();ctx.arc(lx,ly,9,0,Math.PI*2);
  ctx.fillStyle=near?'rgba(184,144,80,.2)':'rgba(184,144,80,.06)';ctx.fill();
  ctx.strokeStyle=near?'rgba(184,144,80,.85)':'rgba(184,144,80,.28)';ctx.lineWidth=1.4;ctx.stroke();
  ctx.fillStyle=near?'rgba(210,170,80,.9)':'rgba(184,144,80,.6)';
  ctx.font='12px Georgia';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('◈',lx,ly);
  ctx.fillStyle='rgba(184,144,80,.18)';ctx.font='7px monospace';ctx.fillText('LAUNCH',lx,ly+17);
  ctx.restore();
}

function drawGround(){
  ctx.save();
  ctx.fillStyle='#0e160e';ctx.fillRect(0,GY(),cv.width,cv.height);
  ctx.strokeStyle='#1e2e1e';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(0,GY());ctx.lineTo(cv.width,GY());ctx.stroke();
  // center guide
  ctx.setLineDash([2,10]);ctx.strokeStyle='rgba(255,255,255,.025)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(CX(),0);ctx.lineTo(CX(),GY());ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,255,255,.03)';ctx.font='8px monospace';ctx.textAlign='center';
  ctx.fillText('center',CX(),GY()-6);
  ctx.restore();
}

function drawHUD(){
  ctx.save();
  ctx.fillStyle='rgba(255,255,255,.05)';ctx.font='9px Georgia';ctx.textAlign='left';
  ctx.fillText(`struct:${structStones.length}  launch:${launchStones.length}`,8,14);
  if(physOn){ctx.fillStyle='rgba(150,130,60,.7)';ctx.textAlign='right';ctx.fillText('PHYSICS LIVE',cv.width-8,14);}
  ctx.restore();
}

// ── Main loop ─────────────────────────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  tickPhys();
  // Background
  ctx.fillStyle='#09090d';ctx.fillRect(0,0,cv.width,cv.height);
  drawGround();
  // Structure stones
  structStones.forEach(s=>drawStone(s,mode==='select'&&s.id===selId));
  // Launch stones (numbered)
  launchStones.forEach((s,i)=>drawStone(s,mode==='select'&&s.id===selId,i+1));
  drawGhost();
  drawLauncher();
  drawHUD();
}

updateHint();updateLXLabel();loop();
</script>
</body>
